[versions]
agp = "9.1.1"
kotlin = "2.2.0"
activityKtx = "1.13.0"
appCompat = "1.7.1"
constraintLayout = "2.2.1"
coreKtx = "1.19.0"
material = "1.14.0"
junit = "4.13.2"
espresso = "3.7.0"
